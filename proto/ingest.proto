syntax = "proto3";

package ingest;

option go_package = "github.com/junyoung/core-x/proto/pb";

// IngestionService handles event ingestion between nodes.
service IngestionService {
  rpc Ingest(IngestRequest) returns (IngestResponse);
}

// IngestRequest carries the event source and payload for inter-node forwarding.
message IngestRequest {
  string source  = 1;
  bytes  payload = 2;
}

// IngestResponse reports the result of an ingest operation.
message IngestResponse {
  bool   ok      = 1;
  string message = 2;
}

// ReplicationService handles WAL streaming from primary to replica.
service ReplicationService {
  // StreamWAL opens a long-lived stream. Primary pushes WALEntry records
  // starting from the replica's last acknowledged offset.
  rpc StreamWAL(StreamWALRequest) returns (stream WALEntry);
}

// StreamWALRequest is sent once by the replica to open the stream.
message StreamWALRequest {
  string replica_id   = 1;
  int64  start_offset = 2;
}

// WALEntry is a single replicated WAL record.
message WALEntry {
  int64 offset      = 1;
  bytes raw_data    = 2;
  int64 record_size = 3;
}

// KVService provides point-lookup reads across cluster nodes.
service KVService {
  rpc Get(GetRequest) returns (GetResponse);
}

// GetRequest carries the key to look up.
message GetRequest {
  string key = 1;
}

// GetResponse carries the result of a KV lookup.
message GetResponse {
  bool   found              = 1;
  bytes  payload            = 2;
  string source             = 3;
  int64  received_at_unix_ns = 4;
}

// RaftService implements Phase 5a leader election RPCs.
// Phase 5b extends AppendEntries with log entries (§5.3 Log Matching).
service RaftService {
  // RequestVote is sent by a Candidate to collect votes.
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  // AppendEntries is sent by the Leader for heartbeats and log replication (§5.3).
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

// LogEntry is a single Raft log record (§5.3).
message LogEntry {
  int64 index = 1; // 1-based log position
  int64 term  = 2; // term when the entry was received by the leader
  bytes data  = 3; // opaque command payload
}

// RequestVoteRequest is sent by a Candidate to each peer.
message RequestVoteRequest {
  int64  term           = 1; // Candidate's current term
  string candidate_id   = 2; // Candidate's node ID
  int64  last_log_index = 3; // Candidate's last log index (log completeness check, §5.4.1)
  int64  last_log_term  = 4; // Candidate's last log term
}

// RequestVoteResponse is the peer's reply to RequestVote.
message RequestVoteResponse {
  int64 term         = 1; // Responder's current term (Candidate uses to update itself)
  bool  vote_granted = 2;
}

// AppendEntriesRequest is sent by the Leader as heartbeat or log replication (§5.3).
message AppendEntriesRequest {
  int64  term           = 1; // Leader's current term
  string leader_id      = 2; // Leader's node ID
  int64  prev_log_index = 3; // Index of log entry immediately preceding new ones
  int64  prev_log_term  = 4; // Term of prev_log_index entry
  repeated LogEntry entries = 5; // Log entries to store (empty for heartbeat)
  int64  leader_commit  = 6; // Leader's commitIndex
}

// AppendEntriesResponse is the Follower's reply to AppendEntries.
// conflict_index and conflict_term enable Fast Backup (§5.3 optimization):
// the leader can skip backward search in O(1) rather than decrementing nextIndex one at a time.
message AppendEntriesResponse {
  int64 term           = 1; // Responder's current term
  bool  success        = 2;
  int64 conflict_index = 3; // First index of conflicting term (Fast Backup)
  int64 conflict_term  = 4; // Term of the conflicting entry (Fast Backup; 0 = no entry at prevLogIndex)
}
